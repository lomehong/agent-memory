services:
  agent-memory:
    build: .
    container_name: agent-memory
    ports:
      - "8100:8100"
    volumes:
      - ./data:/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - M10S_API_KEY=${M10S_API_KEY:-changeme-m10s}
      - DEVFORGE_API_KEY=${DEVFORGE_API_KEY:-changeme-devforge}
      - QBOT_API_KEY=${QBOT_API_KEY:-changeme-qbot}
      - SAGE_API_KEY=${SAGE_API_KEY:-changeme-sage}
      - CLARA_API_KEY=${CLARA_API_KEY:-changeme-clara}
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: agent-memory-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
