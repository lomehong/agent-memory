server:
  host: "0.0.0.0"
  port: 8101

web:
  jwt_secret: "${WEB_JWT_SECRET:-change-me-in-production}"
  token_ttl_hours: 24
  admins:
    - username: "admin"
      password_hash: "<admin-password>"  # 启动时自动bcrypt化
  login_rate_limit: 5

agents:
  - id: m10s
    name: OpenClaw-M10S
    user_id: m10s
    team: default
    api_key: ${M10S_API_KEY:-<your-api-key>}
  - id: devforge
    name: OpenClaw-M10S-dev
    user_id: devforge
    team: default
    api_key: ${DEVFORGE_API_KEY:-<your-api-key>}
  - id: qbot
    name: OpenClaw-M10S-QA
    user_id: qbot
    team: default
    api_key: ${QBOT_API_KEY:-<your-api-key>}
  - id: sage
    name: Sage
    user_id: sage
    team: default
    api_key: ${SAGE_API_KEY:-<your-api-key>}
  - id: clara
    name: Clara
    user_id: clara
    team: default
    api_key: ${CLARA_API_KEY:-dev-api-key-001}
  - id: gem12
    name: OpenClaw-GEM12-MAX-Master
    user_id: gem12
    team: default
    api_key: ${GEM12_API_KEY:-dev-api-key-001}

storage:
  sqlite_path: "./data/memories.db"
  vector:
    provider: "memory"  # memory | qdrant
    host: "localhost"
    port: 6333

embedding:
  provider: "mock"  # mock | onnx | openai
  model: "all-MiniLM-L6-v2"
  model_path: "./models/all-MiniLM-L6-v2.onnx"
  dimensions: 384
  # OpenAI specific config
  openai_api_key: "${OPENAI_API_KEY:-<your-openai-key>}"
  openai_base_url: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"  # 可换成兼容API

dedup:
  thresholds:
    identity: 0.95
    principle: 0.90
    knowledge: 0.85
    working: 0.70

search:
  scoring:
    similarity_weight: 0.40
    priority_weight: 0.25
    access_count_weight: 0.15
    category_weight: 0.10
    urgency_weight: 0.10
  category_weights:
    identity: 1.0
    principle: 0.8
    knowledge: 0.6
    working: 0.4
  urgency:
    threshold_days: 7
    boost: 0.2
  default_page_size: 10
  max_page_size: 50

ttl:
  scan_interval_hours: 6
  degrade_multiplier: 2
  archive_multiplier: 3

governance:
  compress_threshold: 0.85
  auto_delete_days: 0
  max_memories_per_agent: 10000
  max_tags_per_memory: 20
  max_content_length: 10000

# 进化系统配置
evolution:
  dream:
    enabled: true
    min_memories: 3
    max_insights: 10
    default_lookback_days: 7
    pattern_threshold: 0.7
    insight_dedup_threshold: 0.85
    max_source_memories: 20
    run_interval_hours: 24
  review:
    enabled: true
    min_confidence: 0.5
    stale_threshold_days: 30
    error_keywords:
      - "失败"
      - "错误"
      - "bug"
      - "问题"
      - "异常"
      - "error"
      - "fail"
      - "超时"
      - "timeout"
    run_interval_hours: 24
  llm:
    enabled: true
    api_key: "${GLM_API_KEY:-}"
    base_url: "https://open.bigmodel.cn/api/coding/paas/v4"
    model: "glm-5-turbo"
    timeout_seconds: 10
    max_tokens: 2000
  heat:
    frequency_weight: 0.6
    recency_weight: 0.4
    heat_threshold: 30
    extension_multiplier: 1.5

logging:
  level: "info"

monitoring:
  enabled: true
  metrics_path: "/metrics"
